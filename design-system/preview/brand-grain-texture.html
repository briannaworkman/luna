<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: stretch; }
  .slab { position: relative; height: 160px; border-radius: 8px; border: 1px solid var(--luna-hairline); overflow: hidden; padding: 16px; display: flex; flex-direction: column; justify-content: space-between; background: var(--luna-base); }
  .slab.grain::before { content: ""; position: absolute; inset: 0; background: var(--luna-grain); opacity: 0.7; pointer-events: none; mix-blend-mode: screen; }
  .slab > * { position: relative; z-index: 1; }
  .eyebrow { font-family: var(--luna-font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #7DD3FC; }
  .title { font-family: var(--luna-font-display); font-size: 22px; font-weight: 500; color: var(--luna-fg); letter-spacing: -0.01em; }
  .foot { font-family: var(--luna-font-mono); font-size: 10px; color: var(--luna-fg-3); }
</style></head>
<body><div class="card"><div class="two">
  <div class="slab">
    <span class="eyebrow">no grain</span>
    <span class="title">Flat navy ground</span>
    <span class="foot">#050C1A · clean</span>
  </div>
  <div class="slab grain">
    <span class="eyebrow">with grain</span>
    <span class="title">Atmospheric ground</span>
    <span class="foot">fractalNoise · 3.5% α · screen</span>
  </div>
</div></div></body></html>
