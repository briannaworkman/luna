<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stage { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; align-items: center; }
  .hero { background: var(--luna-base-1); border: 1px solid var(--luna-hairline); border-radius: 8px; padding: 32px; min-height: 140px; display: flex; align-items: center; gap: 18px; position: relative; overflow: hidden; }
  .hero::before { content: ""; position: absolute; inset: 0; background: var(--luna-grain); opacity: 0.5; pointer-events: none; mix-blend-mode: screen; }
  .mark { position: relative; width: 44px; height: 44px; color: #E8EDF5; }
  .mark circle { fill: none; stroke: currentColor; stroke-width: 1.25; opacity: 0.3; }
  .mark path { fill: currentColor; }
  .word { position: relative; font-family: var(--luna-font-display); font-weight: 500; font-size: 44px; letter-spacing: 0.14em; color: #E8EDF5; }
  .stack { display: grid; gap: 10px; }
  .chip { background: var(--luna-base-2); border: 1px solid var(--luna-hairline); border-radius: 4px; padding: 8px 12px; font-family: var(--luna-font-mono); font-size: 10px; color: var(--luna-fg-3); letter-spacing: 0.12em; text-transform: uppercase; display: flex; align-items: center; gap: 10px;}
  .chip .dot { width: 8px; height: 8px; border-radius: 999px; background: #E8EDF5; }
  .chip .dot.cy { background: #7DD3FC; }
  .chip .dot.base { background: #050C1A; border: 1px solid var(--luna-hairline-2); }
</style></head>
<body><div class="card"><div class="stage">
  <div class="hero">
    <svg class="mark" viewBox="0 0 32 32"><circle cx="16" cy="16" r="11"/><path d="M16 5a11 11 0 1 0 0 22 7.5 7.5 0 0 1 0-22Z"/></svg>
    <span class="word">LUNA</span>
  </div>
  <div class="stack">
    <div class="chip"><span class="dot"></span>Frost · #E8EDF5</div>
    <div class="chip"><span class="dot base"></span>Base · #050C1A</div>
    <div class="chip"><span class="dot cy"></span>Never cyan wordmark</div>
  </div>
</div></div></body></html>
