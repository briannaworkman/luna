<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .swatch { height: 88px; border-radius: 6px; border: 1px solid var(--luna-hairline); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; gap: 2px; }
  .name { font-family: var(--luna-font-display); font-weight: 500; font-size: 12px; color: var(--luna-fg); letter-spacing: -0.005em;}
  .hex { font-family: var(--luna-font-mono); font-size: 10px; color: var(--luna-fg-3); letter-spacing: 0.04em; }
  .grid6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
</style></head>
<body><div class="card"><div class="grid6">
  <div class="swatch" style="background:#050C1A"><span class="name">base</span><span class="hex">#050C1A</span></div>
  <div class="swatch" style="background:#0A1424"><span class="name">base-1</span><span class="hex">#0A1424</span></div>
  <div class="swatch" style="background:#111E33"><span class="name">base-2</span><span class="hex">#111E33</span></div>
  <div class="swatch" style="background:#1A2942"><span class="name">base-3</span><span class="hex">#1A2942</span></div>
  <div class="swatch" style="background:#1F2E4A"><span class="name">hairline</span><span class="hex">#1F2E4A</span></div>
  <div class="swatch" style="background:#2A3B5C"><span class="name">hairline-2</span><span class="hex">#2A3B5C</span></div>
</div></div></body></html>
