<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stream { background: var(--luna-base-1); border: 1px solid var(--luna-hairline); border-radius: 6px; padding: 14px 16px; font-family: var(--luna-font-mono); font-size: 12px; line-height: 1.7; color: var(--luna-fg-2); letter-spacing: 0.01em; display:grid; gap:2px; position: relative; overflow: hidden;}
  .line { display: grid; grid-template-columns: 74px 18px 1fr; gap: 10px; align-items: baseline; }
  .t { color: var(--luna-fg-4); font-variant-numeric: tabular-nums; }
  .cy { color: #7DD3FC; }
  .muted { color: var(--luna-fg-3); }
  .arr { color: var(--luna-fg-4); }
  .caret { display: inline-block; width: 7px; height: 12px; background: #7DD3FC; transform: translateY(2px); margin-left: 2px; animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0 } }
</style></head>
<body><div class="card"><div class="stream">
  <div class="line"><span class="t">04:12:08</span><span class="cy">◉</span><span><span class="cy">orbit</span> <span class="arr">→</span> computing ground track for 2024-08-12T03:14Z</span></div>
  <div class="line"><span class="t">04:12:09</span><span class="cy">◉</span><span><span class="cy">mineralogy</span> <span class="arr">→</span> querying M3 spectra, <span class="muted">lat 0.69° N, lon 23.47° E</span></span></div>
  <div class="line"><span class="t">04:12:11</span><span class="muted">○</span><span><span class="muted">thermal</span> <span class="arr">→</span> <span class="muted">waiting on Diviner tile M1334189784LE</span></span></div>
  <div class="line"><span class="t">04:12:14</span><span class="cy">◉</span><span><span class="cy">mineralogy</span> returned <span class="cy">14</span> pyroxene matches <span class="muted">· 3 flagged for review</span></span></div>
  <div class="line"><span class="t">04:12:15</span><span class="cy">◉</span><span>synthesising<span class="caret"></span></span></div>
</div></div></body></html>
