<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { display: grid; gap: 12px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .label { font-family: var(--luna-font-mono); font-size: 9px; color: var(--luna-fg-3); letter-spacing: 0.12em; text-transform: uppercase; min-width: 72px;}
  .badge { font-family: var(--luna-font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; border: 1px solid var(--luna-hairline); background: var(--luna-base-1); color: var(--luna-fg-2); display:inline-flex; align-items:center; gap:6px;}
  .dot { width: 6px; height: 6px; border-radius: 999px; }
  .b-cyan { color: #7DD3FC; border-color: rgba(125,211,252,0.32); background: rgba(125,211,252,0.08); }
  .b-success { color: #6EE7B7; border-color: rgba(110,231,183,0.3); background: rgba(110,231,183,0.06); }
  .b-warn { color: #FCD34D; border-color: rgba(252,211,77,0.3); background: rgba(252,211,77,0.06); }
  .b-danger { color: #FB7185; border-color: rgba(251,113,133,0.3); background: rgba(251,113,133,0.06); }
  .b-violet { color: #C4B5FD; border-color: rgba(196,181,253,0.3); background: rgba(196,181,253,0.06); }
  .tag { font-family: var(--luna-font-body); font-size: 12px; padding: 3px 10px; border-radius: 999px; background: var(--luna-base-2); border: 1px solid var(--luna-hairline); color: var(--luna-fg-2); }
  .tag.cy { border-color: rgba(125,211,252,0.32); color: #7DD3FC; }
</style></head>
<body><div class="card"><div class="stack">
  <div class="row"><span class="label">Status</span>
    <span class="badge b-cyan"><span class="dot" style="background:#7DD3FC"></span>Active</span>
    <span class="badge b-success"><span class="dot" style="background:#6EE7B7"></span>Verified</span>
    <span class="badge b-warn"><span class="dot" style="background:#FCD34D"></span>Needs human</span>
    <span class="badge b-danger"><span class="dot" style="background:#FB7185"></span>Contradiction</span>
    <span class="badge"><span class="dot" style="background:#7A849A"></span>Idle</span>
  </div>
  <div class="row"><span class="label">Data tag</span>
    <span class="badge">LROC NAC</span>
    <span class="badge">M1334189784LE</span>
    <span class="badge">0.5 m/px</span>
    <span class="badge b-violet">Apollo 11</span>
  </div>
  <div class="row"><span class="label">Chip</span>
    <span class="tag cy">orbit</span>
    <span class="tag">mineralogy</span>
    <span class="tag">thermal</span>
    <span class="tag">mission history</span>
    <span class="tag">+ 8 more</span>
  </div>
</div></div></body></html>
