<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { display: grid; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  button { font-family: var(--luna-font-body); font-weight: 500; font-size: 13px; border-radius: 6px; padding: 0 14px; height: 34px; border: 1px solid transparent; cursor: pointer; transition: all 120ms ease-out; display: inline-flex; align-items: center; gap: 6px; letter-spacing: -0.005em; }
  .primary { background: #E8EDF5; color: #050C1A; }
  .primary:hover { background: #fff; }
  .cyan { background: #7DD3FC; color: #050C1A; }
  .cyan:hover { background: #9EDFFD; }
  .outline { background: transparent; color: var(--luna-fg); border-color: var(--luna-hairline-2); }
  .outline:hover { background: var(--luna-base-2); }
  .ghost { background: transparent; color: var(--luna-fg-2); }
  .ghost:hover { color: var(--luna-fg); background: var(--luna-base-2); }
  .danger { background: transparent; color: #FB7185; border-color: rgba(251,113,133,0.32); }
  .small { height: 28px; font-size: 12px; padding: 0 10px; }
  .lg { height: 40px; font-size: 14px; padding: 0 18px; }
  .icon { width: 34px; padding: 0; justify-content: center; }
  .kbd { font-family: var(--luna-font-mono); font-size: 10px; color: var(--luna-fg-3); border: 1px solid var(--luna-hairline); padding: 1px 5px; border-radius: 2px; background: var(--luna-base-1); }
  .label { font-family: var(--luna-font-mono); font-size: 9px; color: var(--luna-fg-3); letter-spacing: 0.12em; text-transform: uppercase; min-width: 72px;}
  svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
</style></head>
<body><div class="card"><div class="stack">
  <div class="row"><span class="label">Primary</span>
    <button class="primary">Ask LUNA</button>
    <button class="cyan"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>Run query</button>
    <button class="outline">Cancel</button>
    <button class="ghost">Skip</button>
  </div>
  <div class="row"><span class="label">Sizes</span>
    <button class="outline small">Small</button>
    <button class="outline">Default</button>
    <button class="outline lg">Large</button>
    <button class="outline icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
  </div>
  <div class="row"><span class="label">With kbd</span>
    <button class="primary">Send <span class="kbd" style="color:#050C1A;border-color:rgba(5,12,26,0.2);background:rgba(5,12,26,0.08)">⏎</span></button>
    <button class="outline">Search <span class="kbd">⌘K</span></button>
    <button class="danger">Discard</button>
  </div>
</div></div></body></html>
