<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
  .menu { background: var(--luna-base-2); border: 1px solid var(--luna-hairline-2); border-radius: 6px; padding: 6px; box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px rgba(0,0,0,0.55); width: 260px; }
  .mi { display: grid; grid-template-columns: 18px 1fr auto; gap: 10px; align-items: center; padding: 7px 9px; border-radius: 4px; cursor: pointer; font-family: var(--luna-font-body); font-size: 13px; color: var(--luna-fg); }
  .mi:hover, .mi.active { background: var(--luna-base-3); }
  .mi .kbd { font-family: var(--luna-font-mono); font-size: 10px; color: var(--luna-fg-3); border: 1px solid var(--luna-hairline); padding: 1px 5px; border-radius: 2px; }
  .mi svg { width: 14px; height: 14px; stroke: var(--luna-fg-3); fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  .mi.active svg { stroke: #7DD3FC; }
  .sep { height: 1px; background: var(--luna-hairline); margin: 4px -2px; }
  .hdr { font-family: var(--luna-font-mono); font-size: 10px; color: var(--luna-fg-3); letter-spacing: 0.14em; text-transform: uppercase; padding: 6px 9px 2px; }
  .pop { background: var(--luna-base-2); border: 1px solid rgba(125,211,252,0.32); border-radius: 4px; padding: 10px 12px; font-family: var(--luna-font-mono); font-size: 11px; color: var(--luna-fg-2); width: 260px; box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px rgba(0,0,0,0.55); position: relative;}
  .pop .title { font-family: var(--luna-font-mono); font-size: 10px; color: #7DD3FC; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 6px; display:block;}
  .pop .row { display: grid; grid-template-columns: auto 1fr; gap: 10px; padding: 2px 0;}
  .k { color: var(--luna-fg-3); }
  .v { color: var(--luna-fg); }
  .arrow { position: absolute; top: -6px; left: 18px; width: 10px; height: 10px; background: var(--luna-base-2); border-left: 1px solid rgba(125,211,252,0.32); border-top: 1px solid rgba(125,211,252,0.32); transform: rotate(45deg);}
</style></head>
<body><div class="card"><div class="two">
  <div class="menu">
    <div class="hdr">Agent</div>
    <div class="mi active"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9" opacity="0.5"/></svg><span>Orbit</span><span class="kbd">⌘1</span></div>
    <div class="mi"><svg viewBox="0 0 24 24"><path d="M12 2 3 7l9 5 9-5-9-5z"/><path d="m3 17 9 5 9-5"/><path d="M3 12l9 5 9-5"/></svg><span>Mineralogy</span><span class="kbd">⌘2</span></div>
    <div class="mi"><svg viewBox="0 0 24 24"><path d="M14 4v16M4 12h16"/></svg><span>Thermal imaging</span><span class="kbd">⌘3</span></div>
    <div class="sep"></div>
    <div class="mi"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span>Add custom agent</span><span></span></div>
  </div>
  <div class="pop">
    <span class="arrow"></span>
    <span class="title">M1334189784LE</span>
    <div class="row"><span class="k">sensor</span><span class="v">LROC NAC</span></div>
    <div class="row"><span class="k">captured</span><span class="v">2024-08-12 03:14 UTC</span></div>
    <div class="row"><span class="k">res</span><span class="v">0.5 m/px</span></div>
    <div class="row"><span class="k">incid.</span><span class="v">57.2°</span></div>
  </div>
</div></div></body></html>
