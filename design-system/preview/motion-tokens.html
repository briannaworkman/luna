<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { display: grid; gap: 10px; }
  .row { display: grid; grid-template-columns: 130px 1fr 180px; align-items: center; gap: 12px; padding: 8px 12px; background: var(--luna-base-1); border: 1px solid var(--luna-hairline); border-radius: 4px; }
  .name { font-family: var(--luna-font-mono); font-size: 11px; color: var(--luna-fg); letter-spacing: 0.06em; }
  .val { font-family: var(--luna-font-mono); font-size: 10px; color: var(--luna-fg-3); text-align: right; }
  .track { position: relative; height: 2px; background: var(--luna-hairline-2); border-radius: 2px; overflow: hidden; }
  .dot { position: absolute; left: 0; top: -3px; width: 8px; height: 8px; border-radius: 999px; background: #7DD3FC; animation: slide 2.8s infinite cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes slide { 0% { left: 0 } 50% { left: calc(100% - 8px) } 100% { left: 0 } }
  .s1 .dot { animation-duration: 1.2s }
  .s2 .dot { animation-duration: 2.2s }
  .s3 .dot { animation-duration: 4.2s }
</style></head>
<body><div class="card"><div class="stack">
  <div class="row s1"><span class="name">dur-quick</span><div class="track"><div class="dot"></div></div><span class="val">120ms · ease-out</span></div>
  <div class="row s2"><span class="name">dur-base</span><div class="track"><div class="dot"></div></div><span class="val">220ms · ease-out</span></div>
  <div class="row s3"><span class="name">dur-slow</span><div class="track"><div class="dot"></div></div><span class="val">420ms · ease</span></div>
</div></div></body></html>
