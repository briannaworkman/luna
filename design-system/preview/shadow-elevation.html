<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; align-items: end; }
  .tile { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 14px 0 4px; }
  .box { width: 120px; height: 68px; background: var(--luna-base-2); border: 1px solid var(--luna-hairline); border-radius: 6px; }
  .xs { box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 1px 2px rgba(0,0,0,0.35); }
  .sm { box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 2px 8px rgba(0,0,0,0.45); }
  .md { box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 8px 24px rgba(0,0,0,0.55); }
  .lg { box-shadow: 0 1px 0 rgba(255,255,255,0.05) inset, 0 20px 60px rgba(0,0,0,0.7); }
  .glow { box-shadow: 0 0 0 1px rgba(125,211,252,0.32), 0 0 24px rgba(125,211,252,0.22); border-color: rgba(125,211,252,0.32); }
  .name { font-family: var(--luna-font-mono); font-size: 10px; color: var(--luna-fg); letter-spacing: 0.06em; }
  .val { font-family: var(--luna-font-mono); font-size: 9px; color: var(--luna-fg-3); text-align: center; }
</style></head>
<body><div class="card"><div class="grid4">
  <div class="tile"><div class="box xs"></div><span class="name">shadow-xs</span><span class="val">controls</span></div>
  <div class="tile"><div class="box sm"></div><span class="name">shadow-sm</span><span class="val">card rest</span></div>
  <div class="tile"><div class="box md"></div><span class="name">shadow</span><span class="val">card hover · menu</span></div>
  <div class="tile"><div class="box glow"></div><span class="name">glow</span><span class="val">active agent only</span></div>
</div></div></body></html>
