<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { display: grid; gap: 8px; }
  .row { display: grid; grid-template-columns: 80px 1fr 80px; align-items: center; gap: 12px; }
  .bar { height: 12px; background: #7DD3FC; border-radius: 2px; }
  .name { font-family: var(--luna-font-mono); font-size: 11px; color: var(--luna-fg); letter-spacing: 0.04em; }
  .val { font-family: var(--luna-font-mono); font-size: 10px; color: var(--luna-fg-3); text-align: right; }
</style></head>
<body><div class="card"><div class="stack">
  <div class="row"><span class="name">sp-1</span><div class="bar" style="width:4px"></div><span class="val">4 px</span></div>
  <div class="row"><span class="name">sp-2</span><div class="bar" style="width:8px"></div><span class="val">8 px</span></div>
  <div class="row"><span class="name">sp-3</span><div class="bar" style="width:12px"></div><span class="val">12 px</span></div>
  <div class="row"><span class="name">sp-4</span><div class="bar" style="width:16px"></div><span class="val">16 px</span></div>
  <div class="row"><span class="name">sp-6</span><div class="bar" style="width:24px"></div><span class="val">24 px</span></div>
  <div class="row"><span class="name">sp-8</span><div class="bar" style="width:32px"></div><span class="val">32 px</span></div>
  <div class="row"><span class="name">sp-12</span><div class="bar" style="width:48px"></div><span class="val">48 px</span></div>
  <div class="row"><span class="name">sp-16</span><div class="bar" style="width:64px"></div><span class="val">64 px</span></div>
  <div class="row"><span class="name">sp-24</span><div class="bar" style="width:96px"></div><span class="val">96 px</span></div>
</div></div></body></html>
