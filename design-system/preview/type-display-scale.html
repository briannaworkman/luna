<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { display: grid; gap: 14px; }
  .row { display: grid; grid-template-columns: 1fr auto; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--luna-hairline); padding-bottom: 12px; }
  .row:last-child { border-bottom: 0; padding-bottom: 0; }
  .spec { font-family: var(--luna-font-mono); font-size: 10px; color: var(--luna-fg-3); letter-spacing: 0.04em; }
  .sample { font-family: var(--luna-font-display); color: var(--luna-fg); font-weight: 500; letter-spacing: -0.02em; line-height: 1.08; }
</style></head>
<body><div class="card"><div class="stack">
  <div class="row"><span class="sample" style="font-size: 56px">Mare Tranquillitatis</span><span class="spec">h1 · 56 / 1.08 · -0.02em · Geist 500</span></div>
  <div class="row"><span class="sample" style="font-size: 40px">Twelve agents standing by</span><span class="spec">h2 · 40 / 1.08 · Geist 500</span></div>
  <div class="row"><span class="sample" style="font-size: 28px">Lunar reconnaissance orbiter</span><span class="spec">h3 · 28 / 1.25 · Geist 500</span></div>
</div></div></body></html>
