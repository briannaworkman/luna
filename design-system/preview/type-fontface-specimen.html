<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .split { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .col { display: grid; gap: 8px; }
  .head { font-family: var(--luna-font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #7DD3FC; }
  .name { font-family: var(--luna-font-display); font-size: 28px; font-weight: 500; color: var(--luna-fg); letter-spacing: -0.01em; }
  .alpha { font-family: var(--luna-font-display); font-size: 14px; color: var(--luna-fg-2); line-height: 1.4; }
  .mono-name { font-family: var(--luna-font-mono); font-size: 24px; font-weight: 500; color: var(--luna-fg); letter-spacing: 0.02em; }
  .mono-alpha { font-family: var(--luna-font-mono); font-size: 13px; color: var(--luna-fg-2); line-height: 1.5; }
  .weights { display:flex; gap:10px; flex-wrap:wrap; margin-top:6px; }
  .w { font-family: var(--luna-font-mono); font-size: 9px; color: var(--luna-fg-3); padding: 2px 6px; background: var(--luna-base-1); border: 1px solid var(--luna-hairline); border-radius: 2px; letter-spacing: 0.08em; }
</style></head>
<body><div class="card"><div class="split">
  <div class="col">
    <span class="head">display · body</span>
    <span class="name">Geist</span>
    <span class="alpha">ABCDEFGHIJKLMNOP<br>abcdefghijklmnop<br>0123456789 &amp; — →</span>
    <div class="weights"><span class="w">300</span><span class="w">400</span><span class="w">500</span><span class="w">600</span><span class="w">700</span></div>
  </div>
  <div class="col">
    <span class="head">data · code</span>
    <span class="mono-name">JetBrains Mono</span>
    <span class="mono-alpha">ABCDEFGHIJKLMNOP<br>abcdefghijklmnop<br>0123456789 { } [ ] / *</span>
    <div class="weights"><span class="w">400</span><span class="w">500</span><span class="w">600</span></div>
  </div>
</div></div></body></html>
