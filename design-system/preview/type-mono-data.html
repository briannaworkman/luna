<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .stack { display: grid; gap: 16px; }
  .row { display: grid; grid-template-columns: 1fr 180px; align-items: center; gap: 16px; padding: 10px 14px; background: var(--luna-base-1); border: 1px solid var(--luna-hairline); border-radius: 4px; }
  .spec { font-family: var(--luna-font-mono); font-size: 10px; color: var(--luna-fg-3); letter-spacing: 0.04em; text-align: right; }
  .eyebrow-s { font-family: var(--luna-font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #7DD3FC; }
  .coord { font-family: var(--luna-font-mono); font-size: 13px; color: #7DD3FC; letter-spacing: 0.02em; font-variant-numeric: tabular-nums; }
  .readout { font-family: var(--luna-font-mono); font-size: 13px; color: var(--luna-fg-2); }
  .muted { color: var(--luna-fg-3); }
</style></head>
<body><div class="card"><div class="stack">
  <div class="row"><span class="eyebrow-s">◉ orbit agent · online</span><span class="spec">data-label · 11 · caps 0.14em</span></div>
  <div class="row"><span class="coord">0.6889° N · 23.4731° E · 2024-08-12T03:14:22Z</span><span class="spec">coord · 13 · tabular</span></div>
  <div class="row"><span class="readout">resolving <span style="color:#7DD3FC">M1334189784LE</span> <span class="muted">→ 0.5 m/px</span></span><span class="spec">readout · 13</span></div>
</div></div></body></html>
