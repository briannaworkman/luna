<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <mask id="crescent">
      <rect width="32" height="32" fill="white"/>
      <circle cx="26" cy="16" r="12" fill="black"/>
    </mask>
  </defs>
  <style>
    .moon { fill: #050C1A; }
    @media (prefers-color-scheme: dark) {
      .moon { fill: #E8EDF5; }
    }
  </style>
  <circle class="moon" cx="20" cy="16" r="13" mask="url(#crescent)"/>
</svg>
